<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoProfit</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <h1>GoProfit</h1>
                <nav>
                    <a href="#" class="nav-link active" onclick="switchView('market')">Market</a>
                    <a href="#" class="nav-link" onclick="switchView('items')">Items</a>
                </nav>
            </div>
            <div id="status-bar">
                <span id="market-status">Ready</span>
            </div>
        </header>
        <div id="progress-container" class="hidden">
            <div id="progress-bar"></div>
            <div id="progress-text">Updating... 0/0</div>
        </div>
        <main>
            <div id="market-view">
                <div id="shopping-lists" class="grid-container">
                    <!-- Lists will be injected here -->
                </div>
            </div>

            <div id="items-view" class="hidden" style="padding: 2rem;">
                <div class="search-container">
                    <input type="text" id="item-search" placeholder="Search items..." onkeyup="handleSearch(event)">
                </div>
                <div id="items-list" class="grid-container">
                    <!-- Items will be injected here -->
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
